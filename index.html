<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hula Hoop Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7c6fcd;
      --green:  #22c55e;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --orange: #f97316;
      --bg:      #f8f7ff;
      --surface: #ffffff;
      --border:  rgba(0,0,0,0.1);
      --text:    #1a1a2e;
      --muted:   #6b7280;
      --r: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0f0f1a;
        --surface: #1c1c2e;
        --border:  rgba(255,255,255,0.1);
        --text:    #f0eeff;
        --muted:   #9ca3af;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: .9rem;
    }
    header { text-align: center; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header p  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    #cam-wrap {
      position: relative;
      width: 100%; max-width: 560px;
      background: var(--surface);
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
    }
    #cam-wrap video  { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #cam-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--muted); font-size: .85rem; z-index: 2;
    }
    #placeholder svg { opacity: .3; }
    #sample-hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #fff; font-size: .78rem;
      padding: 6px 16px; border-radius: 999px; pointer-events: none;
      white-space: nowrap; z-index: 5; display: none;
    }
    #sample-hint.on { display: block; }

    #color-row {
      display: flex; align-items: center; gap: 10px;
      width: 100%; max-width: 560px;
    }
    #swatch {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #color-label { font-size: .8rem; color: var(--muted); flex: 1; }
    #sample-btn {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: .82rem; cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    #sample-btn.active { background: var(--orange); color: #fff; border-color: transparent; }
    #sample-btn:active { transform: scale(.97); }

    .row {
      display: flex; align-items: center; gap: 10px;
      width: 100%; max-width: 560px;
      font-size: .78rem; color: var(--muted);
    }
    .row input[type=range] { flex: 1; accent-color: var(--purple); }
    .row .val { min-width: 22px; font-weight: 600; color: var(--text); font-size: .8rem; }

    #stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; width: 100%; max-width: 560px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .card-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .card-val   { font-size: 1.6rem; font-weight: 600; line-height: 1.1; }
    .card-val.big { font-size: 2.6rem; }

    #controls { display: flex; gap: 10px; width: 100%; max-width: 560px; }
    button.ctrl {
      flex: 1; padding: 12px 10px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: .88rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    button.ctrl:active { transform: scale(.97); }
    button.ctrl.primary { background: var(--purple); color: #fff; border-color: transparent; }
    button.ctrl:disabled { opacity: .55; cursor: default; }

    #status-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: var(--muted);
      width: 100%; max-width: 560px;
    }
    #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .3s; }
    #dot.green  { background: var(--green); }
    #dot.yellow { background: var(--amber); }
    #dot.red    { background: var(--red); }
    #dot.orange { background: var(--orange); }

    #graph-wrap {
      width: 100%; max-width: 560px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px;
    }
    #graph { display: block; width: 100%; }
  </style>
</head>
<body>

<header>
  <h1>🎡 Hula Hoop Counter</h1>
  <p>Color-based rotation tracking — tap the hoop to calibrate</p>
</header>

<div id="cam-wrap">
  <div id="placeholder">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
    </svg>
    <span>Tap "Start camera" to begin</span>
  </div>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="sample-hint">👆 Tap the hoop to sample its color</div>
</div>

<div id="color-row">
  <div id="swatch"></div>
  <span id="color-label">No color sampled yet</span>
  <button id="sample-btn">Sample color</button>
</div>

<div class="row">
  <span>Color tolerance</span>
  <input type="range" id="tolerance" min="1" max="9" value="4" step="1" />
  <span class="val" id="tol-out">4</span>
</div>

<div id="stats">
  <div class="card"><span class="card-label">Rotations</span><span class="card-val big" id="count-el">0</span></div>
  <div class="card"><span class="card-label">RPM</span><span class="card-val" id="rpm-el">—</span></div>
  <div class="card"><span class="card-label">Time</span><span class="card-val" id="time-el">0s</span></div>
</div>

<div id="controls">
  <button class="ctrl primary" id="start-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Start camera
  </button>
  <button class="ctrl" id="reset-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.24"/>
    </svg>
    Reset
  </button>
</div>

<div id="status-bar"><div id="dot"></div><span id="status-txt">Waiting to start…</span></div>
<div id="graph-wrap"><canvas id="graph" height="56"></canvas></div>

<script>
const videoEl    = document.getElementById('video');
const canvasEl   = document.getElementById('canvas');
const graphEl    = document.getElementById('graph');
const ctx        = canvasEl.getContext('2d');
const gCtx       = graphEl.getContext('2d');
const countEl    = document.getElementById('count-el');
const rpmEl      = document.getElementById('rpm-el');
const timeEl     = document.getElementById('time-el');
const dot        = document.getElementById('dot');
const statusTxt  = document.getElementById('status-txt');
const startBtn   = document.getElementById('start-btn');
const resetBtn   = document.getElementById('reset-btn');
const sampleBtn  = document.getElementById('sample-btn');
const tolInput   = document.getElementById('tolerance');
const tolOut     = document.getElementById('tol-out');
const swatchEl   = document.getElementById('swatch');
const colorLbl   = document.getElementById('color-label');
const sampleHint = document.getElementById('sample-hint');
const placeholder= document.getElementById('placeholder');

/* low-res processing canvas */
const PROC_W = 160, PROC_H = 120;
const procCv = document.createElement('canvas');
procCv.width = PROC_W; procCv.height = PROC_H;
const pCtx = procCv.getContext('2d');

/* state */
let cameraStarted = false, running = false, sampling = false;
let targetHsv = null;
let rotations = 0, startTime = null, timerInterval = null;
let xHist = [], yHist = [], graphBuf = [];
let prevSmoothed = null;
let sustainedDir = 0, sustainedCount = 0, confirmedDir = 0;
let lastPeakTime = 0, lastValleyVal = null, peakFlash = 0;

const HIST_MAX     = 90;
const SMOOTH_W     = 9;
const GRAPH_MAX    = 200;
const MIN_PIXELS   = 25;    // minimum matching pixels to trust centroid
const MIN_AMP      = 0.06;  // 6% of frame — real rotation moves the centroid clearly
const MIN_PEAK_MS  = 320;   // max ~185 rpm
const DEAD_ZONE    = 0.002; // ignore sub-0.2% moves (camera noise)
const SUSTAIN_N    = 4;     // frames of consistent direction before confirming turn

/* colour helpers */
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx - mn;
  let h = 0;
  const s = mx === 0 ? 0 : d / mx, v = mx;
  if (d !== 0) {
    if      (mx === r) h = ((g-b)/d + (g<b?6:0)) / 6;
    else if (mx === g) h = ((b-r)/d + 2) / 6;
    else               h = ((r-g)/d + 4) / 6;
  }
  return [h, s, v];
}
function hueDiff(a, b) { const d = Math.abs(a-b); return d > 0.5 ? 1-d : d; }

function colorMatches(r, g, b) {
  if (!targetHsv) return false;
  const [h, s, v] = rgbToHsv(r, g, b);
  if (v < 0.08) return false;
  const [th, ts] = targetHsv;
  const tol = parseInt(tolInput.value) * 0.025; // 0.025 – 0.225
  if (ts < 0.18) return s < 0.25 && Math.abs(v - targetHsv[2]) < tol * 2;
  if (s < 0.12) return false;
  return hueDiff(h, th) < tol && Math.abs(v - targetHsv[2]) < 0.5;
}

/* signal helpers */
function smooth(arr) {
  if (arr.length < 2) return arr[arr.length-1] ?? 0.5;
  const w = Math.min(SMOOTH_W, arr.length), sl = arr.slice(-w);
  return sl.reduce((a,b)=>a+b,0) / sl.length;
}
function variance(arr) {
  if (arr.length < 4) return 0;
  const m = arr.reduce((a,b)=>a+b,0)/arr.length;
  return arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length;
}

function setStatus(msg, cls) { statusTxt.textContent = msg; dot.className = cls; }

/* graph */
function drawGraph() {
  const W = graphEl.offsetWidth || 540; graphEl.width = W;
  const H = 56; gCtx.clearRect(0,0,W,H);
  if (graphBuf.length < 2) return;
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const lc = peakFlash > 0 ? '#22c55e' : (dark ? '#fb923c' : '#ea6a1a');
  gCtx.strokeStyle = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  gCtx.lineWidth = 0.5;
  gCtx.beginPath(); gCtx.moveTo(0,H/2); gCtx.lineTo(W,H/2); gCtx.stroke();
  const data = graphBuf.slice(-GRAPH_MAX);
  const mn = Math.min(...data), mx2 = Math.max(...data), rng = mx2-mn||0.01;
  gCtx.strokeStyle = lc; gCtx.lineWidth = 2; gCtx.beginPath();
  data.forEach((v,i) => {
    const x=(i/(GRAPH_MAX-1))*W, y=H-((v-mn)/rng)*(H-10)-5;
    i===0 ? gCtx.moveTo(x,y) : gCtx.lineTo(x,y);
  });
  gCtx.stroke();
  if (peakFlash>0) peakFlash--;
}

/* centroid tracking */
function trackCentroid(nx, ny) {
  xHist.push(nx); yHist.push(ny);
  if (xHist.length > HIST_MAX) { xHist.shift(); yHist.shift(); }
  const xv = variance(xHist.slice(-40)), yv = variance(yHist.slice(-40));
  const primary = xv >= yv ? xHist : yHist;
  const cur = smooth(primary);
  graphBuf.push(cur);
  if (graphBuf.length > GRAPH_MAX*2) graphBuf = graphBuf.slice(-GRAPH_MAX);

  if (prevSmoothed !== null && running && startTime !== null) {
    const dir = cur > prevSmoothed + DEAD_ZONE ? 1
              : cur < prevSmoothed - DEAD_ZONE ? -1 : 0;

    // accumulate sustained direction — resets on reversal
    if (dir !== 0) {
      if (dir === sustainedDir) { sustainedCount++; }
      else { sustainedDir = dir; sustainedCount = 1; }
    }

    // only act once we have SUSTAIN_N frames of consistent movement
    if (sustainedCount >= SUSTAIN_N) {
      if (confirmedDir === -1 && sustainedDir === 1) {
        lastValleyVal = cur;  // valley confirmed
      }
      if (confirmedDir === 1 && sustainedDir === -1) {
        // peak confirmed — now check amplitude AND recent signal range
        const amp = lastValleyVal !== null ? cur - lastValleyVal : 0;
        const recent = primary.slice(-30);
        const recentRange = Math.max(...recent) - Math.min(...recent);
        const now = Date.now();
        if (amp > MIN_AMP && recentRange > MIN_AMP && now - lastPeakTime > MIN_PEAK_MS) {
          rotations++; countEl.textContent = rotations;
          lastPeakTime = now; peakFlash = 10; updateRPM();
        }
      }
      if (sustainedDir !== confirmedDir) confirmedDir = sustainedDir;
    }
  }
  prevSmoothed = cur;
}

function updateRPM() {
  if (!startTime || rotations === 0) { rpmEl.textContent = '—'; return; }
  rpmEl.textContent = Math.round(rotations / ((Date.now()-startTime)/60000));
}

/* main loop */
function processFrame() {
  requestAnimationFrame(processFrame);
  const W = canvasEl.width, H = canvasEl.height;
  if (!W || !H) return;

  pCtx.drawImage(videoEl, 0, 0, PROC_W, PROC_H);
  const data = pCtx.getImageData(0, 0, PROC_W, PROC_H).data;

  let sumX=0, sumY=0, count=0;
  for (let i=0; i<data.length; i+=4) {
    if (colorMatches(data[i], data[i+1], data[i+2])) {
      const px=(i/4)%PROC_W, py=Math.floor((i/4)/PROC_W);
      sumX+=px; sumY+=py; count++;
    }
  }

  ctx.drawImage(videoEl, 0, 0, W, H);

  if (targetHsv && count >= MIN_PIXELS) {
    const cx=(sumX/count)/PROC_W*W, cy=(sumY/count)/PROC_H*H;
    const flash = peakFlash > 0;
    ctx.save();
    ctx.strokeStyle = flash ? '#22c55e' : '#f97316';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = flash ? '#22c55e' : '#f97316'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); ctx.stroke();
    ctx.restore();
    trackCentroid(sumX/count/PROC_W, sumY/count/PROC_H);
    if (running) setStatus('Tracking hoop — ' + count + ' px matched', 'green');
  } else if (targetHsv) {
    if (running) setStatus('Hoop not found — try adjusting color tolerance or lighting', 'yellow');
  }

  drawGraph();
}

/* sampling */
function startSampling() {
  if (!cameraStarted) return;
  sampling = true;
  sampleBtn.classList.add('active');
  sampleBtn.textContent = 'Tap the hoop…';
  sampleHint.classList.add('on');
  setStatus('Tap anywhere on the hoop in the camera view', 'orange');
}

function handleTap(clientX, clientY) {
  if (!sampling) return;
  const rect = canvasEl.getBoundingClientRect();
  const tapX = clientX - rect.left;
  const tapY = clientY - rect.top;
  const scaleX = canvasEl.width / rect.width;
  const scaleY = canvasEl.height / rect.height;
  // canvas is CSS-mirrored, so mirror x back
  const realX = canvasEl.width - tapX * scaleX;
  const realY = tapY * scaleY;
  const px = Math.round(realX / canvasEl.width  * PROC_W);
  const py = Math.round(realY / canvasEl.height * PROC_H);
  pCtx.drawImage(videoEl, 0, 0, PROC_W, PROC_H);
  const patch = pCtx.getImageData(Math.max(0,px-3), Math.max(0,py-3), 7, 7).data;
  let r=0, g=0, b=0, n=0;
  for (let i=0; i<patch.length; i+=4) { r+=patch[i]; g+=patch[i+1]; b+=patch[i+2]; n++; }
  r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
  targetHsv = rgbToHsv(r, g, b);
  swatchEl.style.background = `rgb(${r},${g},${b})`;
  colorLbl.textContent = `rgb(${r}, ${g}, ${b})`;
  prevSmoothed=null; sustainedDir=0; sustainedCount=0; confirmedDir=0;
  graphBuf=[]; xHist=[]; yHist=[];
  lastValleyVal=null; lastPeakTime=0;
  sampling=false;
  sampleBtn.classList.remove('active');
  sampleBtn.textContent = 'Re-sample';
  sampleHint.classList.remove('on');
  setStatus('Color sampled! Start hooping — counter will begin automatically.', 'green');
}

canvasEl.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvasEl.addEventListener('touchend', e => { e.preventDefault(); const t=e.changedTouches[0]; handleTap(t.clientX, t.clientY); });

/* timer */
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    if (!startTime) return;
    timeEl.textContent = Math.floor((Date.now()-startTime)/1000)+'s';
    updateRPM();
  }, 500);
}

/* reset */
function doReset() {
  rotations=0; xHist=[]; yHist=[]; graphBuf=[];
  prevSmoothed=null; sustainedDir=0; sustainedCount=0; confirmedDir=0;
  lastPeakTime=0; lastValleyVal=null; peakFlash=0;
  countEl.textContent='0'; rpmEl.textContent='—'; timeEl.textContent='0s';
  if (timerInterval) { clearInterval(timerInterval); timerInterval=null; }
  if (running) startTimer(); else startTime=null;
}

/* start camera */
async function startCamera() {
  if (cameraStarted) return;
  cameraStarted=true; startBtn.disabled=true;
  startBtn.innerHTML = 'Starting…';
  setStatus('Requesting camera access…', 'yellow');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    placeholder.style.display = 'none';
    canvasEl.width  = videoEl.videoWidth  || 640;
    canvasEl.height = videoEl.videoHeight || 480;
    running = true;
    startTimer();
    processFrame();
    startBtn.innerHTML = '● Camera on';
    setStatus('Camera ready — tap "Sample color" then tap your hoop', 'green');
  } catch(e) {
    console.error(e);
    setStatus('Camera access denied or unavailable', 'red');
    startBtn.disabled=false;
    startBtn.innerHTML='Start camera';
    cameraStarted=false;
  }
}

startBtn.addEventListener('click', startCamera);
resetBtn.addEventListener('click', doReset);
sampleBtn.addEventListener('click', startSampling);
tolInput.addEventListener('input', () => { tolOut.textContent = tolInput.value; });
setInterval(drawGraph, 100);
</script>
</body>
</html>
